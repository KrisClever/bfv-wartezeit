<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wartezeit">
<meta name="theme-color" content="#0062AD">
<title>BFV Wartezeit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0062AD;
    --bg-deep: #004A82;
    --cream: #F2EDE3;
    --cream-dark: #E8E2D5;
    --ink: #0A0A0A;
    --ink-soft: #2A2A2A;
    --ink-muted: #6B6B6B;
    --line: rgba(10,10,10,0.12);
    --white: #FFFFFF;
    --accent: #FFB800;
    --ok: #1B7B47;
    --no: #C0392B;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 28px) 20px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* === Page header === */
  .page-head {
    color: var(--white);
    margin: 12px 0 28px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 10px;
  }

  .page-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 44px;
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }

  .page-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.75;
    margin-top: 12px;
    letter-spacing: 0.02em;
  }

  /* === Input card === */
  .input-card {
    background: var(--cream);
    border-radius: 24px;
    padding: 24px 22px 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.08);
  }

  .field {
    margin-bottom: 18px;
  }
  .field:last-of-type { margin-bottom: 22px; }

  .field-label {
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: block;
  }

  .date-btn {
    width: 100%;
    background: var(--white);
    border: none;
    border-radius: 14px;
    padding: 16px 18px;
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: transform 0.08s, box-shadow 0.15s;
    box-shadow: inset 0 0 0 1.5px var(--line);
  }
  .date-btn:active { transform: scale(0.985); }
  .date-btn.has-value { box-shadow: inset 0 0 0 1.5px var(--ink); }
  .date-btn .val.placeholder { color: var(--ink-muted); font-weight: 400; }
  .date-btn .chev {
    color: var(--ink);
    opacity: 0.4;
    font-size: 14px;
  }

  .toggle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .toggle {
    background: var(--white);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.04em;
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    box-shadow: inset 0 0 0 1.5px var(--line);
  }
  .toggle:active { transform: scale(0.985); }
  .toggle.on[data-value="ja"] {
    background: var(--ok);
    color: var(--white);
    box-shadow: none;
  }
  .toggle.on[data-value="nein"] {
    background: var(--no);
    color: var(--white);
    box-shadow: none;
  }
  .toggle.on[data-value="maennlich"],
  .toggle.on[data-value="weiblich"] {
    background: var(--ink);
    color: var(--white);
    box-shadow: none;
  }

  .submit {
    width: 100%;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 16px;
    padding: 20px;
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.08s, background 0.15s;
  }
  .submit:active { transform: scale(0.99); background: var(--ink-soft); }

  /* === Result Pantone Card === */
  .pantone {
    margin-top: 24px;
    background: var(--cream);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.22), 0 4px 12px rgba(0,0,0,0.10);
    display: none;
    transform: translateY(8px);
    opacity: 0;
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .pantone.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .swatch {
    position: relative;
    aspect-ratio: 4 / 3;
    background: var(--swatch-color, var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    overflow: hidden;
  }

  .swatch-letter {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 220px;
    line-height: 0.8;
    letter-spacing: -0.06em;
    user-select: none;
    -webkit-user-select: none;
  }
  .swatch-letter.compact { font-size: 140px; }

  .swatch-mini {
    position: absolute;
    top: 16px;
    left: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .swatch-code {
    position: absolute;
    top: 16px;
    right: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    opacity: 0.85;
  }

  .pantone-body {
    padding: 22px 24px 24px;
  }

  .pantone-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .pantone-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  .rights {
    margin-top: 22px;
    border-top: 1.5px solid var(--line);
  }

  .right-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1.5px solid var(--line);
    gap: 16px;
  }
  .right-row:last-child { border-bottom: none; }

  .right-label {
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .right-val {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 19px;
    color: var(--ink);
    text-align: right;
    letter-spacing: -0.01em;
  }
  .right-val.muted { color: var(--ok); font-size: 14px; font-style: italic; font-weight: 600; }
  .right-val.warn { color: var(--no); font-size: 13px; font-weight: 600; line-height: 1.3; }

  .notes {
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--cream-dark);
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .notes-head {
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 10px;
    display: block;
  }
  .notes ul { margin: 0; padding-left: 18px; }
  .notes li { margin-bottom: 6px; }
  .notes li:last-child { margin-bottom: 0; }
  .notes strong { color: var(--ink); }

  .footer-brand {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1.5px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .footer-brand-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .footer-brand-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
  }

  .page-foot {
    text-align: center;
    margin-top: 24px;
    color: rgba(255,255,255,0.65);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    line-height: 1.7;
  }
  .page-foot strong { color: var(--white); }

  /* ===== Wheel Picker Modal ===== */
  .picker-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .picker-overlay.visible { opacity: 1; pointer-events: auto; }

  .picker-sheet {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -20px 60px rgba(0,0,0,0.3);
  }
  .picker-sheet.visible { transform: translateY(0); }

  .handle {
    width: 38px; height: 4px;
    background: rgba(10,10,10,0.2);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .picker-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 10px;
  }
  .picker-bar button {
    background: none; border: none;
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 6px 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .picker-cancel { color: var(--ink-muted); }
  .picker-done {
    color: var(--ink);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .picker-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }

  .wheels {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1.4fr 1.4fr;
    height: 220px;
    overflow: hidden;
    background: var(--white);
    margin: 6px 16px 20px;
    border-radius: 16px;
  }

  .band {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 44px;
    background: rgba(0,98,173,0.08);
    border-top: 1.5px solid rgba(0,98,173,0.25);
    border-bottom: 1.5px solid rgba(0,98,173,0.25);
    pointer-events: none;
  }

  .wheel {
    height: 100%;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 28%, black 72%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 28%, black 72%, transparent 100%);
  }
  .wheel::-webkit-scrollbar { display: none; }

  .w-items { padding: 88px 0; }
  .w-item {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
    scroll-snap-stop: always;
    font-family: 'Archivo', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
    transition: color 0.12s, font-weight 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .w-item.sel {
    color: var(--ink);
    font-weight: 800;
  }
</style>
</head>
<body>

<div class="page-head">
  <div class="eyebrow">Post SV Nürnberg</div>
  <h1 class="page-title">BFV<br>Wartezeit</h1>
  <div class="page-sub">JUGEND · HERREN · FRAUEN</div>
</div>

<div class="input-card">
  <div class="field">
    <label class="field-label">Geburtsdatum</label>
    <button type="button" class="date-btn" data-target="geburtsdatum">
      <span class="val placeholder">Datum wählen</span>
      <span class="chev">▾</span>
    </button>
  </div>

  <div class="field">
    <label class="field-label">Geschlecht</label>
    <div class="toggle-row">
      <button type="button" class="toggle" data-toggle="geschlecht" data-value="maennlich">♂ Männlich</button>
      <button type="button" class="toggle" data-toggle="geschlecht" data-value="weiblich">♀ Weiblich</button>
    </div>
  </div>

  <div class="field">
    <label class="field-label">Abmeldedatum</label>
    <button type="button" class="date-btn" data-target="abmeldung">
      <span class="val placeholder">Datum wählen</span>
      <span class="chev">▾</span>
    </button>
  </div>

  <div class="field">
    <label class="field-label">Letztes Spiel</label>
    <button type="button" class="date-btn" data-target="letztesSpiel">
      <span class="val placeholder">Optional</span>
      <span class="chev">▾</span>
    </button>
  </div>

  <div class="field">
    <label class="field-label">Freigabe / Zustimmung</label>
    <div class="toggle-row">
      <button type="button" class="toggle" data-toggle="freigabe" data-value="ja">Ja</button>
      <button type="button" class="toggle" data-toggle="freigabe" data-value="nein">Nein</button>
    </div>
  </div>

  <button type="button" class="submit" id="calcBtn">Berechnen</button>
</div>

<div class="pantone" id="result">
  <div class="swatch" id="swatch">
    <div class="swatch-letter" id="swatchLetter">D</div>
  </div>
  <div class="pantone-body">
    <h2 class="pantone-title" id="resTitle">D-Jugend</h2>
    <div class="pantone-sub" id="resSub">JAHRGANG 2014</div>

    <div class="rights">
      <div class="right-row">
        <span class="right-label">Privatspielrecht</span>
        <span class="right-val" id="resPrivat">—</span>
      </div>
      <div class="right-row">
        <span class="right-label">Verbandsspielrecht</span>
        <span class="right-val" id="resVerband">—</span>
      </div>
    </div>

    <div class="notes" id="notes">
      <span class="notes-head">Hinweise</span>
      <ul id="notesList"></ul>
    </div>

    <div class="footer-brand">
      <span class="footer-brand-name">Post SV Nürnberg</span>
      <span class="footer-brand-num">6256</span>
    </div>
  </div>
</div>

<div class="page-foot">
  BFV-JUGENDORDNUNG · SPIELORDNUNG<br>
  OHNE GEWÄHR<br>
  VERSION 2026-06-02-v12
</div>

<!-- Wheel Picker -->
<div class="picker-overlay" id="pov"></div>
<div class="picker-sheet" id="psheet">
  <div class="handle"></div>
  <div class="picker-bar">
    <button type="button" class="picker-cancel" id="pCancel">Abbrechen</button>
    <span class="picker-title" id="pTitle">Datum</span>
    <button type="button" class="picker-done" id="pDone">Fertig</button>
  </div>
  <div class="wheels">
    <div class="band"></div>
    <div class="wheel" id="wDay"><div class="w-items" id="wDayI"></div></div>
    <div class="wheel" id="wMonth"><div class="w-items" id="wMonthI"></div></div>
    <div class="wheel" id="wYear"><div class="w-items" id="wYearI"></div></div>
  </div>
</div>

<script>
(function() {
  const MONTHS = ['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const IH = 44;

  // Color codes per Altersklasse
  const COLORS = {
    A: '#5B1F8B', // purple
    B: '#E85D04', // orange
    C: '#C81D25', // red
    D: '#0062AD', // BFV blue
    E: '#1B7B47', // green
    F: '#FFB800', // amber
    G: '#88B04B', // light green
    H: '#0A0A0A', // herren black
    S: '#2A2A2A', // senioren dark
  };

  // Dates
  const SAISON_START_JUGEND = new Date(2026, 7, 1);
  const SAISON_START_HERREN = new Date(2026, 6, 1);
  const SAISON_WINTER_START = new Date(2027, 0, 1);
  const JUG_SOMMER_VON = new Date(2026, 5, 1);
  const JUG_SOMMER_BIS = new Date(2026, 6, 15);
  const HERREN_WP1_END = new Date(2026, 5, 30);
  const HERREN_WP2_END = new Date(2026, 11, 31);
  const HERREN_NICHTZ_VERBAND = new Date(2026, 10, 1);

  const state = { geburtsdatum: null, abmeldung: null, letztesSpiel: null, freigabe: null, geschlecht: null };

  const dim = (y, m) => new Date(y, m+1, 0).getDate();
  // addMonths mit Monatsende-Clipping (z.B. 31.05 + 6M = 30.11, nicht 01.12)
  const addMonths = (d, n) => {
    const result = new Date(d.getFullYear(), d.getMonth() + n, d.getDate());
    if (result.getDate() !== d.getDate()) result.setDate(0);
    return result;
  };
  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const maxD = (...a) => new Date(Math.max(...a.map(x => x.getTime())));
  const fmtDe = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
  const fmtBtn = d => `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;

  // === Wheel picker ===
  const pov = document.getElementById('pov');
  const ps = document.getElementById('psheet');
  const wDay = document.getElementById('wDay'), wMonth = document.getElementById('wMonth'), wYear = document.getElementById('wYear');
  const wDayI = document.getElementById('wDayI'), wMonthI = document.getElementById('wMonthI'), wYearI = document.getElementById('wYearI');
  const pTitle = document.getElementById('pTitle');

  let curTarget = null;
  let yRange = [];

  function build(el, vals) {
    el.innerHTML = '';
    vals.forEach((v, i) => {
      const d = document.createElement('div');
      d.className = 'w-item';
      d.textContent = v;
      d.dataset.idx = i;
      el.appendChild(d);
    });
  }
  function setIdx(w, i, smooth) {
    const top = i * IH;
    if (smooth) w.scrollTo({ top, behavior: 'smooth' });
    else w.scrollTop = top;
    upd(w);
  }
  const getIdx = w => Math.round(w.scrollTop / IH);
  function upd(w) {
    const i = getIdx(w);
    w.querySelectorAll('.w-item').forEach((el, j) => {
      el.classList.toggle('sel', j === i);
    });
  }
  function attach(w, onSnap) {
    let t = null;
    w.addEventListener('scroll', () => {
      requestAnimationFrame(() => upd(w));
      clearTimeout(t);
      t = setTimeout(() => onSnap && onSnap(getIdx(w)), 130);
    });
    w.addEventListener('click', e => {
      const it = e.target.closest('.w-item');
      if (!it) return;
      const i = parseInt(it.dataset.idx, 10);
      if (!isNaN(i)) setIdx(w, i, true);
    });
  }
  function rebuildDay(y, m, keep) {
    const n = dim(y, m);
    const days = [];
    for (let i = 1; i <= n; i++) days.push(i);
    build(wDayI, days);
    setIdx(wDay, Math.min(keep, n) - 1, false);
  }
  function open(target) {
    curTarget = target;
    pTitle.textContent = ({geburtsdatum:'Geburtsdatum',abmeldung:'Abmeldedatum',letztesSpiel:'Letztes Spiel'})[target];
    let minY, maxY, def;
    const today = new Date();
    if (target === 'geburtsdatum') { minY = 1930; maxY = 2025; def = state.geburtsdatum || new Date(2014, 5, 15); }
    else if (target === 'abmeldung') { minY = 2024; maxY = 2028; def = state.abmeldung || today; }
    else { minY = 2024; maxY = 2028; def = state.letztesSpiel || state.abmeldung || today; }

    yRange = [];
    for (let i = minY; i <= maxY; i++) yRange.push(i);
    build(wMonthI, MONTHS);
    build(wYearI, yRange);
    const y = def.getFullYear(), m = def.getMonth(), d = def.getDate();
    rebuildDay(y, m, d);
    setIdx(wMonth, m, false);
    setIdx(wYear, yRange.indexOf(y), false);
    pov.classList.add('visible');
    ps.classList.add('visible');
  }
  function close() { pov.classList.remove('visible'); ps.classList.remove('visible'); }
  function done() {
    const y = yRange[getIdx(wYear)], m = getIdx(wMonth), d = getIdx(wDay) + 1;
    const date = new Date(y, m, d);
    state[curTarget] = date;
    const btn = document.querySelector(`[data-target="${curTarget}"]`);
    const val = btn.querySelector('.val');
    val.textContent = fmtBtn(date);
    val.classList.remove('placeholder');
    btn.classList.add('has-value');
    close();
  }
  attach(wDay);
  attach(wMonth, () => { const yi = getIdx(wYear); if (yRange[yi] !== undefined) rebuildDay(yRange[yi], getIdx(wMonth), getIdx(wDay)+1); });
  attach(wYear, () => { const yi = getIdx(wYear); if (yRange[yi] !== undefined) rebuildDay(yRange[yi], getIdx(wMonth), getIdx(wDay)+1); });
  document.querySelectorAll('.date-btn').forEach(b => b.addEventListener('click', () => open(b.dataset.target)));
  document.getElementById('pCancel').addEventListener('click', close);
  document.getElementById('pDone').addEventListener('click', done);
  pov.addEventListener('click', close);

  // === Toggle ===
  document.querySelectorAll('.toggle').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll(`[data-toggle="${b.dataset.toggle}"]`).forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      state[b.dataset.toggle] = b.dataset.value;
    });
  });

  // === Altersklasse ===
  // Saison läuft 01.07. - 30.06. (gemäß BFV-Spielordnung)
  function getSaison(date) {
    if (date.getMonth() >= 6) return { start: date.getFullYear(), end: date.getFullYear() + 1 };
    return { start: date.getFullYear() - 1, end: date.getFullYear() };
  }

  // Altersklasse anhand Geburtsjahr, Abmeldedatum UND Geschlecht
  // Juniorinnen: keine A-Juniorinnen — ältere B-Juniorin (U17) bereits passrechtlich wie Frauen
  function getAK(jahr, abmeldungDate, geschlecht) {
    const saison = getSaison(abmeldungDate);
    const u = saison.end - jahr;

    if (geschlecht === 'weiblich') {
      // Mädchen / Frauen
      if (u >= 17) {
        let label, letter;
        if (u === 17) { label = 'B-Juniorinnen (älter) · Frauenrecht'; letter = 'B'; }
        else if (u >= 30 && u < 40) { label = 'Frauen Ü30'; letter = 'S'; }
        else if (u >= 40 && u < 50) { label = 'Frauen Ü40'; letter = 'S'; }
        else if (u >= 50) { label = 'Frauen Ü' + (Math.floor(u/10)*10); letter = 'S'; }
        else { label = 'Frauen'; letter = 'F'; }
        return { name: label, kat: 'herren', verband: true, letter, kuerzel: letter, saison, geschlecht };
      }
      if (u === 16) return { name: 'B-Juniorinnen (jünger)', kat: 'jugend', verband: true, letter: 'B', kuerzel: 'B', saison, geschlecht };
      if (u === 15) return { name: 'C-Juniorinnen (älter)', kat: 'jugend', verband: true, letter: 'C', kuerzel: 'C', saison, geschlecht };
      if (u === 14) return { name: 'C-Juniorinnen (jünger)', kat: 'jugend', verband: true, letter: 'C', kuerzel: 'C', saison, geschlecht };
      if (u === 13) return { name: 'D-Juniorinnen (älter)', kat: 'jugend', verband: true, letter: 'D', kuerzel: 'D', saison, geschlecht };
      if (u === 12) return { name: 'D-Juniorinnen (jünger)', kat: 'jugend', verband: true, letter: 'D', kuerzel: 'D', saison, geschlecht };
      if (u === 11) return { name: 'E-Juniorinnen (älter)', kat: 'jugend', verband: false, letter: 'E', kuerzel: 'E', saison, geschlecht };
      if (u === 10) return { name: 'E-Juniorinnen (jünger)', kat: 'jugend', verband: false, letter: 'E', kuerzel: 'E', saison, geschlecht };
      if (u === 9) return { name: 'F-Juniorinnen (älter)', kat: 'jugend', verband: false, letter: 'F', kuerzel: 'F', saison, geschlecht };
      if (u === 8) return { name: 'F-Juniorinnen (jünger)', kat: 'jugend', verband: false, letter: 'F', kuerzel: 'F', saison, geschlecht };
      if (u <= 7) return { name: 'G-Juniorinnen / Bambini', kat: 'jugend', verband: false, letter: 'G', kuerzel: 'G', saison, geschlecht };
      return null;
    }

    // Jungs / Herren (Default)
    if (u >= 19) {
      let label, letter;
      if (u === 19) { label = 'A-Jugend / Herrenrecht'; letter = 'A'; }
      else if (u >= 32 && u < 40) { label = 'Senioren Ü32'; letter = 'S'; }
      else if (u >= 40 && u < 50) { label = 'Senioren Ü40'; letter = 'S'; }
      else if (u >= 50) { label = 'Senioren Ü' + (Math.floor(u/10)*10); letter = 'S'; }
      else { label = 'Herren'; letter = 'H'; }
      return { name: label, kat: 'herren', verband: true, letter, kuerzel: letter, saison, geschlecht };
    }
    if (u === 18) return { name: 'A-Jugend (jünger)', kat: 'jugend', verband: true, letter: 'A', kuerzel: 'A', saison, geschlecht };
    if (u === 17) return { name: 'B-Jugend (älter)', kat: 'jugend', verband: true, letter: 'B', kuerzel: 'B', saison, geschlecht };
    if (u === 16) return { name: 'B-Jugend (jünger)', kat: 'jugend', verband: true, letter: 'B', kuerzel: 'B', saison, geschlecht };
    if (u === 15) return { name: 'C-Jugend (älter)', kat: 'jugend', verband: true, letter: 'C', kuerzel: 'C', saison, geschlecht };
    if (u === 14) return { name: 'C-Jugend (jünger)', kat: 'jugend', verband: true, letter: 'C', kuerzel: 'C', saison, geschlecht };
    if (u === 13) return { name: 'D-Jugend (älter)', kat: 'jugend', verband: true, letter: 'D', kuerzel: 'D', saison, geschlecht };
    if (u === 12) return { name: 'D-Jugend (jünger)', kat: 'jugend', verband: true, letter: 'D', kuerzel: 'D', saison, geschlecht };
    if (u === 11) return { name: 'E-Jugend (älter)', kat: 'jugend', verband: false, letter: 'E', kuerzel: 'E', saison, geschlecht };
    if (u === 10) return { name: 'E-Jugend (jünger)', kat: 'jugend', verband: false, letter: 'E', kuerzel: 'E', saison, geschlecht };
    if (u === 9) return { name: 'F-Jugend (älter)', kat: 'jugend', verband: false, letter: 'F', kuerzel: 'F', saison, geschlecht };
    if (u === 8) return { name: 'F-Jugend (jünger)', kat: 'jugend', verband: false, letter: 'F', kuerzel: 'F', saison, geschlecht };
    if (u <= 7) return { name: 'G-Jugend / Bambini', kat: 'jugend', verband: false, letter: 'G', kuerzel: 'G', saison, geschlecht };
    return null;
  }

  // === Berechnung Jugend ===
  function calcJ(ak, ab, ls, f) {
    const tA = addDays(ab, 1);
    const tL = ls ? addDays(ls, 1) : null;
    const inSommer = ab >= JUG_SOMMER_VON && ab <= JUG_SOMMER_BIS;

    // Wegfall der Wartefrist bei 6 Monaten Spielpause — gilt auch in der Jugend
    const inaktivDatum = ls ? addDays(addMonths(ls, 6), 1) : null;
    const inaktivSpielrecht = inaktivDatum ? maxD(inaktivDatum, tA) : null;

    let pri = inSommer ? SAISON_START_JUGEND : tA;
    let ver = null, hin = [];

    if (!ak.verband) {
      ver = 'KEINE';
      hin.push('Im Minifußball (E-, F-, G-Jugend) reicht das Privatspielrecht für Meisterschaftsspiele. <strong>Keine Wartezeit.</strong>');
      if (inSommer) hin.push('Spielrecht ab Eingang der Unterlagen, frühestens ab <strong>01.08.2026</strong>.');
      else hin.push('Spielrecht ab Eingang der Unterlagen beim BFV.');
      return { pri, ver, hin };
    }

    // Reguläre Berechnung
    if (inSommer) {
      if (f === 'ja') {
        ver = SAISON_START_JUGEND;
        hin.push('<strong>Sommerwechsel mit Freigabe:</strong> Verbandsspielrecht ab 01.08.2026 (Saisonstart).');
        hin.push('Passantrag-Eingang bis spätestens <strong>30.09.2026</strong>.');
      } else {
        let we = addMonths(tA, 3);
        if (tL && ls > ab) { we = maxD(we, addMonths(tL, 3)); hin.push('Wartezeit verlängert, da letztes Spiel nach Abmeldung lag.'); }
        ver = maxD(we, SAISON_START_JUGEND);
        hin.push('<strong>Sommerwechsel ohne Freigabe:</strong> 3 Monate Wartezeit ab Tag nach Abmeldung.');
      }
    } else {
      const mn = f === 'ja' ? 3 : 6;
      let we = addMonths(tA, mn);
      if (tL && ls > ab) { we = maxD(we, addMonths(tL, mn)); hin.push('Wartezeit verlängert, da letztes Spiel nach Abmeldung lag.'); }
      ver = we;
      if (f === 'ja') hin.push('<strong>Wechsel während Spieljahr mit Freigabe:</strong> 3 Monate Wartezeit ab Tag nach Abmeldung.');
      else hin.push('<strong>Wechsel während Spieljahr ohne Freigabe:</strong> 6 Monate Wartezeit ab Tag nach Abmeldung.');
    }

    // Wegfall der Wartefrist: gewinnt bei früherer 6-Monats-Inaktivität.
    // Reguläre Hinweise werden ersetzt, da sie sonst widersprüchlich wären.
    if (inaktivSpielrecht && inaktivSpielrecht < ver) {
      const regulaer = fmtDe(ver);
      ver = inaktivSpielrecht;
      hin = [
        '<strong>Wegfall der Wartefrist:</strong> Spieler ist seit letztem Spiel durchgehend 6 Monate inaktiv → Verbandsspielrecht ab <strong>' + fmtDe(inaktivSpielrecht) + '</strong>. Nachweis der Spielpause beilegen.',
        'Die reguläre Wartezeit (bis ' + regulaer + ') entfällt dadurch.'
      ];
    }

    return { pri, ver, hin };
  }

  // === Berechnung Herren/Frauen ===
  function calcH(ab, ls, f, geschlecht) {
    const tA = addDays(ab, 1); // Tag nach Abmeldung ≈ Antragseingang
    const inWP1 = ab <= HERREN_WP1_END;
    const inWP2 = ab > HERREN_WP1_END && ab <= HERREN_WP2_END;
    const paragraph = geschlecht === 'weiblich' ? '§ 39 FMO' : '§ 44 SpO';

    // § 44 Nr. 2: "nach Ablauf von sechs Monaten, gerechnet ab dem zuletzt gespielten Spiel"
    // BFV-Praxis: letztes Spiel + 6 Monate, spielberechtigt am Tag NACH Ablauf (+1 Tag).
    // Frühestens jedoch ab Antragseingang (man kann nicht vor Anmeldung spielen).
    const inaktivDatum = ls ? addDays(addMonths(ls, 6), 1) : null;
    const inaktivSpielrecht = inaktivDatum ? maxD(inaktivDatum, tA) : null;

    // Privatspielrecht (Freundschaftsspiele): immer ab Antragseingang
    let pri = tA;
    let ver = null, hin = [];

    if (inWP1) {
      if (f === 'ja') {
        ver = maxD(tA, SAISON_START_HERREN);
        hin.push('<strong>WP I (Sommer) mit Zustimmung:</strong> Verbandsspielrecht ab Eingang, frühestens 01.07.2026.');
        hin.push('Passantrag-Eingang bis spätestens <strong>31.08.2026</strong>.');
      } else {
        ver = HERREN_NICHTZ_VERBAND; // 01.11.2026
        hin.push('<strong>WP I ohne Zustimmung:</strong> Pflichtspielrecht ab festem Stichtag <strong>01.11.2026</strong> (§ 42 Nr. 3).');
        hin.push('Alternative: Ausbildungsentschädigung zahlen → ersetzt fehlende Zustimmung (bis 31.08.2026).');
      }
    } else if (inWP2) {
      if (f === 'ja') {
        ver = maxD(tA, SAISON_WINTER_START);
        hin.push('<strong>WP II (Winter) mit Zustimmung:</strong> Verbandsspielrecht ab Eingang, frühestens 01.01.2027.');
        hin.push('Passantrag-Eingang bis spätestens <strong>31.01.2027</strong>.');
        hin.push('In WP II keine Ausbildungsentschädigung als Zustimmungsersatz möglich (§ 43 Nr. 4).');
      } else {
        ver = new Date(2027, 10, 1); // 01.11.2027
        hin.push('<strong>WP II ohne Zustimmung:</strong> Verbandsspielrecht frühestens zum <strong>01.11.2027</strong> (01.11. des folgenden Spieljahres, § 43 Nr. 3).');
        hin.push('In WP II keine Ausbildungsentschädigung als Zustimmungsersatz möglich (§ 43 Nr. 4).');
      }
    } else {
      // Außerhalb beider Wechselperioden
      ver = 'INAKTIV';
      hin.push('<strong>Außerhalb der Wechselperioden:</strong> Privatspielrecht sofort ab Antragseingang. Verbandsspielrecht nur über Inaktivität (' + paragraph + ' Nr. 2) oder Warten auf nächste WP I.');
    }

    // § 44 Nr. 2 "bleibt unberührt": Der Inaktivitäts-Wegfall greift in ALLEN Fällen
    // (auch mit Zustimmung, auch in WP II) und gewinnt, wenn er ein früheres Datum ergibt.
    // Reguläre Hinweise werden dann ersetzt, da sie sonst widersprüchlich wären.
    if (inaktivSpielrecht && (ver === 'INAKTIV' || inaktivSpielrecht < ver)) {
      const regulaer = (ver === 'INAKTIV') ? null : fmtDe(ver);
      ver = inaktivSpielrecht;
      hin = [
        '<strong>Wegfall der Wartefrist (' + paragraph + ' Nr. 2):</strong> Spieler ist seit letztem Spiel durchgehend 6 Monate inaktiv → Verbandsspielrecht ab <strong>' + fmtDe(inaktivSpielrecht) + '</strong>. Nachweis der Spielpause (alle Spiele inkl. Freundschaftsspiele) beilegen.'
      ];
      if (regulaer) hin.push('Die reguläre Frist (bis ' + regulaer + ') entfällt dadurch.');
    }

    return { pri, ver, hin };
  }

  // === Submit ===
  document.getElementById('calcBtn').addEventListener('click', () => {
    if (!state.geburtsdatum) { alert('Bitte Geburtsdatum wählen.'); return; }
    if (!state.geschlecht) { alert('Bitte Geschlecht wählen.'); return; }
    if (!state.abmeldung) { alert('Bitte Abmeldedatum wählen.'); return; }
    if (!state.freigabe) { alert('Bitte Freigabe Ja/Nein wählen.'); return; }

    const jahr = state.geburtsdatum.getFullYear();
    const ak = getAK(jahr, state.abmeldung, state.geschlecht);
    if (!ak) { alert('Geburtsjahr außerhalb des berechenbaren Bereichs.'); return; }

    const r = ak.kat === 'herren'
      ? calcH(state.abmeldung, state.letztesSpiel, state.freigabe, state.geschlecht)
      : calcJ(ak, state.abmeldung, state.letztesSpiel, state.freigabe);

    // Render
    const color = COLORS[ak.kuerzel] || COLORS.D;
    document.getElementById('swatch').style.setProperty('--swatch-color', color);

    const letterEl = document.getElementById('swatchLetter');
    letterEl.textContent = ak.letter;
    letterEl.classList.toggle('compact', ak.letter.length > 1);

    document.getElementById('resTitle').textContent = ak.name;
    document.getElementById('resSub').textContent = 'JAHRGANG ' + jahr;
    document.getElementById('resPrivat').textContent = fmtDe(r.pri);
    document.getElementById('resPrivat').className = 'right-val';

    const ve = document.getElementById('resVerband');
    ve.className = 'right-val';
    if (r.ver === 'KEINE') { ve.textContent = 'nicht erforderlich'; ve.classList.add('muted'); }
    else if (r.ver === 'INAKTIV') { ve.textContent = 'nur nach 6 Mon. Spielpause'; ve.classList.add('warn'); }
    else ve.textContent = fmtDe(r.ver);

    const nl = document.getElementById('notesList');
    nl.innerHTML = r.hin.map(h => '<li>' + h + '</li>').join('');

    const res = document.getElementById('result');
    res.classList.add('visible');
    setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  });
})();
</script>
</body>
